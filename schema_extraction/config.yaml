repositories:
  - "Project-MONAI/MONAI"


extraction_schema:
  - name: "Issue"
    description: "The original GitHub Issue or Pull Request that started the discussion. Extract the exact title, body, author, and timestamp as provided in the context."
    singular_occurrence: true
    type: "JsonObjectConcept"
    structure:
      title: "str"
      body: "str"
      author: "str"
      timestamp: "str"

  - name: "Decision"
    description: "The current consensus of the choice made. If a decision was established earlier, it REMAINS the decision. DO NOT return null if a consensus was previously reached. Summarize the consensus up to this point."
    singular_occurrence: true

  - name: "Rationale"
    description: "The justification for the decision. Maintain technical reasoning discussed throughout the history. Ensure established rationale is carried forward."
    singular_occurrence: true

  - name: "Description"
    description: "The scope and context (components, layers, MLOps stages). Defines where the decision applies."
    singular_occurrence: true

  - name: "Argument"
    description: "Extract arguments (Pro, Con, Neutral) from the text. Use provided classification labels."
    singular_occurrence: false
    type: "JsonObjectConcept"
    structure:
      author: "str"
      timestamp: "str"
      classification: "str" # Must be Pro, Con, or Neutral
      argument: "str"

  - name: "Cost"
    description: "Resources required (e.g., development time, compute, storage). Summarize if mentioned or clearly implied. This is CUMULATIVE: maintain all previously identified costs unless revised."
    singular_occurrence: true

  - name: "Risk"
    description: "Potential downsides, technical debt, or uncertainties. Summarize if mentioned or clearly implied. This is CUMULATIVE: maintain all previously identified risks unless revised."
    singular_occurrence: true